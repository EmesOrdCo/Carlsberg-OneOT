<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carlsberg OneOT Global Deployment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-logo">CARLSBERG</div>
      <div class="loader-text">Loading OneOT Global Deployment</div>
      <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    </div>
  </div>

  <!-- Header -->
  <header id="app-header">
    <div class="header-left">
      <div class="header-logo">CARLSBERG</div>
      <div class="header-divider"></div>
      <h1 class="header-title">OneOT Global Deployment</h1>
    </div>
    <div class="header-right">
      <div class="view-toggle" id="view-toggle">
        <button class="view-btn active" data-view="region">Region</button>
        <button class="view-btn" data-view="mes">MES Status</button>
        <button class="view-btn" data-view="year">Deployment Year</button>
      </div>
    </div>
  </header>

  <!-- Legend -->
  <div id="legend" class="legend"></div>

  <!-- Globe Container -->
  <div id="globe-container"></div>

  <!-- Site Detail Panel -->
  <div id="detail-panel" class="detail-panel">
    <button class="panel-close" id="panel-close">&times;</button>
    <div class="panel-content" id="panel-content"></div>
  </div>

  <!-- Tour Controls -->
  <div id="tour-bar" class="tour-bar hidden">
    <div class="tour-progress">
      <div class="tour-progress-fill" id="tour-progress-fill"></div>
    </div>
    <div class="tour-controls">
      <button class="tour-btn" id="tour-prev" title="Previous site">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="tour-btn tour-btn-main" id="tour-play" title="Play/Pause tour">
        <svg class="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
        <svg class="icon-pause hidden" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="tour-btn" id="tour-next" title="Next site">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <span class="tour-label" id="tour-label">Tour: 0 / 0</span>
      <button class="tour-btn tour-btn-stop" id="tour-stop" title="End tour">End Tour</button>
    </div>
  </div>

  <!-- Start Tour Button -->
  <button id="start-tour-btn" class="start-tour-btn">Start Guided Tour</button>

  <!-- Site Counter -->
  <div id="site-counter" class="site-counter"></div>

  <script src="https://unpkg.com/globe.gl@2.45.1/dist/globe.gl.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/tour.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
